<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Student Achievement Tracker — 시험 등록, 자동 채점, 영역별 성취도 분석 (개인 테스트용 프로토타입)">
  <title>Student Achievement Tracker</title>
  <link rel="stylesheet" href="css/styles.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js" defer></script>
</head>
<body>
  <div class="app">
    <header class="app-header no-print">
      <div class="app-header__inner app-brand">
        <h1>Student Achievement Tracker</h1>
        <p>시험 등록 · 자동 채점 · 영역별 성취도 분석</p>
        <button type="button" class="btn btn-secondary btn-sm header-help-btn no-print" data-action="open-help">도움말</button>
      </div>
      <nav class="app-nav" aria-label="주요 메뉴">
        <button type="button" class="nav-link nav-link--active" data-nav="dashboard" data-view="dashboard">대시보드</button>
        <button type="button" class="nav-link" data-nav="classes" data-view="classes">반·학생</button>
        <button type="button" class="nav-link" data-nav="exams" data-view="exams">시험 설정</button>
        <button type="button" class="nav-link" data-nav="answer-entry" data-view="answer-entry">답안 입력</button>
        <button type="button" class="nav-link" data-nav="student-results" data-view="student-results">학생 결과</button>
        <button type="button" class="nav-link" data-nav="exam-overview" data-view="exam-overview">시험 결과</button>
        <button type="button" class="nav-link" data-nav="backup" data-view="backup">백업</button>
      </nav>
    </header>

    <main id="main-content" class="app-main" role="main">
      <div class="empty-state"><p>로딩 중…</p></div>
    </main>
  </div>

  <div id="modal-overlay" class="modal-overlay hidden" aria-hidden="true"></div>
  <div id="confirm-modal" class="modal hidden" role="alertdialog" aria-modal="true">
    <h2 class="modal-title">확인</h2>
    <p class="modal-body"></p>
    <div class="modal-footer">
      <button type="button" class="btn btn-secondary" data-action="cancel">취소</button>
      <button type="button" class="btn btn-primary" data-action="confirm">확인</button>
    </div>
  </div>

  <div id="help-modal" class="modal modal--help hidden" role="dialog" aria-modal="true" aria-labelledby="help-modal-title">
    <div class="help-modal__inner" id="help-modal-content"></div>
  </div>

  <div id="toast-container" aria-live="polite"></div>

  <script src="js/constants.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/help-guide.js"></script>
  <script src="js/category-utils.js"></script>
  <script src="js/storage-repository.js"></script>
  <script src="js/assessment-manager.js"></script>
  <script src="js/chart-manager.js"></script>
  <script src="js/import-export-manager.js"></script>
  <script src="js/answer-entry-manager.js"></script>
  <script src="js/renderer.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
